<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | KSIS Teacher Performance System</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* Background */
    body {
      font-family: "Poppins", sans-serif;
      height: 100vh;
      margin: 0;
      background: url("../static/images/aiuis-bg.jpg") no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      backdrop-filter: blur(10px) brightness(0.9);
      background: rgba(255, 255, 255, 0.15);
      z-index: 0;
    }

    /* Container */
    .register-container {
      position: relative;
      z-index: 1;
      width: 950px;
      height: 560px;
      display: flex;
      border-radius: 25px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 30px rgba(0,0,0,0.2);
      border: 2px solid rgba(59,130,246,0.4);
      animation: glowBorder 3s ease-in-out infinite alternate;
      transform: translateY(30px);
      opacity: 0;
      animation: fadeSlideIn 1s ease-out forwards;
    }

    @keyframes fadeSlideIn {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes glowBorder {
      0% {
        box-shadow: 0 0 15px rgba(59,130,246,0.4),
                    0 0 30px rgba(59,130,246,0.2),
                    0 0 60px rgba(168,85,247,0.15);
      }
      50% {
        box-shadow: 0 0 25px rgba(59,130,246,0.7),
                    0 0 50px rgba(59,130,246,0.4),
                    0 0 80px rgba(168,85,247,0.2);
      }
      100% {
        box-shadow: 0 0 15px rgba(59,130,246,0.4),
                    0 0 30px rgba(59,130,246,0.2),
                    0 0 60px rgba(168,85,247,0.15);
      }
    }

    /* Left Form */
    .register-left {
      flex: 1;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transform: translateX(-50px);
      animation: slideLeftIn 0.8s ease-out forwards;
      opacity: 0;
      animation-delay: 0.2s;
    }

    @keyframes slideLeftIn {
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .register-left h3 {
      font-weight: 600;
      color: #0078d7;
      margin-bottom: 10px;
    }

    .register-left p {
      color: #555;
      margin-bottom: 25px;
    }

    .form-control {
      border-radius: 12px;
      border: 1.5px solid #c9d5f5;
      padding: 12px;
      font-size: 0.95rem;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: #0078d7;
      box-shadow: 0 0 0 3px rgba(0, 120, 215, 0.15);
    }

    .btn-register {
      width: 100%;
      background-color: #0078d7;
      border: none;
      color: #fff;
      border-radius: 12px;
      padding: 12px;
      font-weight: 500;
      transition: background 0.3s ease;
    }

    .btn-register:hover {
      background-color: #005ea2;
    }

    .login-link {
      text-align: center;
      margin-top: 15px;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #0078d7;
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    /* Right illustration */
    .register-right {
      flex: 1;
      background: linear-gradient(135deg, #eaf3ff, #f6faff);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .register-right img {
      width: 80%;
      max-width: 480px;
      transform: translateX(50px);
      opacity: 0;
      animation: slideRightIn 0.8s ease-out forwards;
      animation-delay: 0.3s;
    }

    @keyframes slideRightIn {
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    #message {
      color: red;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="register-container" id="registerContainer">
    <!-- Left Side -->
    <div class="register-left">
      <h3>Create Account</h3>
      <p>Join the KSIS Teacher Performance System</p>

      <input type="text" id="full_name" class="form-control" placeholder="Full Name" />
      <input type="email" id="email" class="form-control" placeholder="Email" />
      <input type="password" id="password" class="form-control" placeholder="Password" />

      <select id="role" class="form-control">
        <option value="">Select Role</option>
        <option value="admin">Admin</option>
        <option value="teacher">Teacher</option>
        <option value="principal">Principal</option>
      </select>

      <button id="registerBtn" type="button">Register</button>
      <p id="registerMessage"></p>

      <div class="login-link">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>

    <!-- Right Side -->
    <div class="register-right">
      <img src="../static/images/aiuis-login-illustration.png" alt="Illustration" />
    </div>
  </div>

          // Small exit animation before redirect

  </script>
</body>
</html>
